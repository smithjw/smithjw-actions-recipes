Description: |
  Packaging step for Rectangle. Must run after the download recipe so
  `URLDownloaderPython` caching can short-circuit unchanged builds.

  Wraps the downloaded Rectangle.app into an installer pkg.
Identifier: com.github.smithjw-actions.pkg.Rectangle
ParentRecipe: com.github.smithjw-actions.download.Rectangle
MinimumVersion: '2.9'

Input:
  NAME: Rectangle
  SOFTWARE_TITLE: Rectangle

Process:
  - Processor: AppPkgCreator
    Arguments:
      app_path: '%RECIPE_CACHE_DIR%/downloads/%SOFTWARE_TITLE%.dmg/Rectangle.app'
      pkg_path: '%RECIPE_CACHE_DIR%/%SOFTWARE_TITLE%-%version%.pkg'
