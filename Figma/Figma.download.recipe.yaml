Description: |
  Downloads Figma and produces a verified artefact for downstream packaging.

  Run as part of the full download → pkg → upload chain. The `URLDownloaderPython`
  processor (in `SharedProcessors/`) caches by ETag/Last-Modified and the
  `StopProcessingIf download_changed == False` predicate short-circuits the chain
  on no-op re-runs. Pointing the upload recipe at a pre-built pkg would defeat
  this cache and re-upload on every CI run.

  Downloads the most recent signed release of Figma Desktop from the vendor's static URLs.

  Figma publishes separate `mac-arm` and `mac` (Intel) `.zip` files; we pull both so the
  resulting pkg can install on either architecture (see Figma.pkg.recipe.yaml).
Identifier: com.github.smithjw-actions.download.Figma
MinimumVersion: '2.9'

Input:
  NAME: Figma
  SOFTWARE_TITLE: Figma
  DOWNLOAD_URL_ARM64: https://desktop.figma.com/mac-arm/Figma.zip
  DOWNLOAD_URL_X86_64: https://desktop.figma.com/mac/Figma.zip
  DOWNLOAD_MISSING_FILE: null
  BYPASS_STOP_PROCESSING_IF_DOWNLOAD_UNCHANGED: 'False'

Process:
  - Processor: URLDownloaderPython
    Arguments:
      download_missing_file: '%DOWNLOAD_MISSING_FILE%'
      filename: '%SOFTWARE_TITLE%-arm64.zip'
      url: '%DOWNLOAD_URL_ARM64%'

  - Processor: URLDownloaderPython
    Arguments:
      download_missing_file: '%DOWNLOAD_MISSING_FILE%'
      filename: '%SOFTWARE_TITLE%-x86_64.zip'
      url: '%DOWNLOAD_URL_X86_64%'

  - Processor: EndOfCheckPhase

  - Processor: StopProcessingIf
    Arguments:
      predicate: 'download_changed == %BYPASS_STOP_PROCESSING_IF_DOWNLOAD_UNCHANGED%'

  - Processor: Unarchiver
    Arguments:
      archive_path: '%RECIPE_CACHE_DIR%/downloads/%SOFTWARE_TITLE%-arm64.zip'
      destination_path: '%RECIPE_CACHE_DIR%/unpack/arm64'
      purge_destination: true

  - Processor: Unarchiver
    Arguments:
      archive_path: '%RECIPE_CACHE_DIR%/downloads/%SOFTWARE_TITLE%-x86_64.zip'
      destination_path: '%RECIPE_CACHE_DIR%/unpack/x86_64'
      purge_destination: true

  - Processor: CodeSignatureVerifier
    Arguments:
      deep_verification: true
      input_path: '%RECIPE_CACHE_DIR%/unpack/arm64/Figma.app'
      requirement: identifier "com.figma.Desktop" and anchor apple generic and certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and certificate leaf[subject.OU] = "T8RA8NE3B7"
      strict_verification: true

  - Processor: CodeSignatureVerifier
    Arguments:
      deep_verification: true
      input_path: '%RECIPE_CACHE_DIR%/unpack/x86_64/Figma.app'
      requirement: identifier "com.figma.Desktop" and anchor apple generic and certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and certificate leaf[subject.OU] = "T8RA8NE3B7"
      strict_verification: true

  - Processor: Versioner
    Arguments:
      input_plist_path: '%RECIPE_CACHE_DIR%/unpack/arm64/Figma.app/Contents/Info.plist'
      plist_version_key: CFBundleShortVersionString
