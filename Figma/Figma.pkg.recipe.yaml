Description: |
  Packaging step for Figma. Must run after the download recipe so
  `URLDownloaderPython` caching can short-circuit unchanged builds.

  Packages both architectures of Figma into a single installer pkg. A postinstall script
  picks the correct .app for the device's architecture and removes the other.
Identifier: com.github.smithjw-actions.pkg.Figma
ParentRecipe: com.github.smithjw-actions.download.Figma
MinimumVersion: '2.9'

Input:
  NAME: Figma
  SOFTWARE_TITLE: Figma

Process:
  - Processor: PkgRootCreator
    Arguments:
      pkgroot: '%RECIPE_CACHE_DIR%/payload'
      pkgdirs:
        Applications: '0755'
        scripts: '0755'

  - Processor: Copier
    Arguments:
      source_path: '%RECIPE_CACHE_DIR%/unpack/arm64/Figma.app'
      destination_path: '%RECIPE_CACHE_DIR%/payload/Applications/Figma-arm64.app'

  - Processor: Copier
    Arguments:
      source_path: '%RECIPE_CACHE_DIR%/unpack/x86_64/Figma.app'
      destination_path: '%RECIPE_CACHE_DIR%/payload/Applications/Figma-x86_64.app'

  - Processor: FileCreator
    Arguments:
      file_path: '%RECIPE_CACHE_DIR%/payload/scripts/postinstall'
      file_mode: '0755'
      file_content: |
        #!/bin/bash
        set -euo pipefail
        if [[ $( /usr/bin/arch ) = arm64* ]]; then
          /bin/rm -rf "/Applications/Figma-x86_64.app"
          /bin/mv "/Applications/Figma-arm64.app" "/Applications/Figma.app"
        else
          /bin/rm -rf "/Applications/Figma-arm64.app"
          /bin/mv "/Applications/Figma-x86_64.app" "/Applications/Figma.app"
        fi
        exit 0

  - Processor: PkgCreator
    Arguments:
      pkg_request:
        id: com.figma.Desktop
        options: purge_ds_store
        pkgdir: '%RECIPE_CACHE_DIR%'
        pkgname: '%SOFTWARE_TITLE%-%version%'
        pkgroot: '%RECIPE_CACHE_DIR%/payload'
        scripts: '%RECIPE_CACHE_DIR%/payload/scripts'
        version: '%version%'

  - Processor: PathDeleter
    Arguments:
      path_list:
        - '%RECIPE_CACHE_DIR%/payload'
        - '%RECIPE_CACHE_DIR%/unpack'
