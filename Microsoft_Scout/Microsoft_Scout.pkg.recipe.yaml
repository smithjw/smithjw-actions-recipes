Description: |
  Packages Microsoft Scout into a package from the DMG

  ARCHITECTURE must be set to arm64 or x86_64 to match the downloaded DMG.
Identifier: com.github.smithjw-actions.pkg.Microsoft_Scout
ParentRecipe: com.github.smithjw-actions.download.Microsoft_Scout
MinimumVersion: '2.9'

Input:
  NAME: Microsoft Scout
  SOFTWARE_TITLE: Microsoft_Scout
  ARCHITECTURE: arm64

Process:
  - Processor: AppDmgVersioner
    Arguments:
      dmg_path: '%RECIPE_CACHE_DIR%/downloads/%SOFTWARE_TITLE%-%ARCHITECTURE%.dmg'

  - Processor: AppPkgCreator
