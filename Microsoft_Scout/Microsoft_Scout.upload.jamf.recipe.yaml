Description: |
  Uploads the packaged Microsoft Scout installer to Jamf Pro and removes older
  packages beyond the configured retention count.

  Run as part of the full download → pkg → upload chain. The `URLDownloaderPython`
  processor in the download parent caches by ETag/Last-Modified/Content-Length,
  allowing unchanged releases to short-circuit before package creation or upload.
  Pointing this recipe directly at a pre-built pkg would defeat that cache.

  This parent owns only package upload and cleanup. Downstream override repos own
  the Jamf policy, smart-group lifecycle, and environment-specific scope.
Identifier: com.github.smithjw-actions.jamf.upload.Microsoft_Scout
ParentRecipe: com.github.smithjw-actions.pkg.Microsoft_Scout
MinimumVersion: '2.9'

Input:
  NAME: Microsoft Scout
  SOFTWARE_TITLE: Microsoft_Scout
  CATEGORY: Apps
  REMOVE_OLD_PACKAGES: 'true'
  PACKAGE_INFO: autopkg
  PKG_TO_KEEP: '2'
  PKG_NAME_MATCH: '%SOFTWARE_TITLE%-'

Process:
  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPackageUploader
    Arguments:
      pkg_category: '%CATEGORY%'
      pkg_info: '%PACKAGE_INFO%'

  - Processor: com.github.grahampugh.recipes.postprocessors/LastRecipeRunResult

  - Processor: StopProcessingIf
    Arguments:
      predicate: '%REMOVE_OLD_PACKAGES% == false'

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPackageCleaner
    Arguments:
      pkg_name_match: '%PKG_NAME_MATCH%'
      versions_to_keep: '%PKG_TO_KEEP%'
