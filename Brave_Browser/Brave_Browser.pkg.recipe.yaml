Description: |
  Packaging step for Brave Browser. Must run after the download recipe so
  `URLDownloaderPython` caching can short-circuit unchanged builds.

  Packages both architectures of Brave Browser into a single installer pkg. A
  postinstall script picks the correct .app for the device's architecture and
  removes the other.
Identifier: com.github.smithjw-actions.pkg.Brave_Browser
ParentRecipe: com.github.smithjw-actions.download.Brave_Browser
MinimumVersion: '2.9'

Input:
  NAME: Brave Browser
  SOFTWARE_TITLE: Brave_Browser

Process:
  - Processor: PkgRootCreator
    Arguments:
      pkgroot: '%RECIPE_CACHE_DIR%/payload'
      pkgdirs:
        Applications: '0755'
        scripts: '0755'

  - Processor: Copier
    Arguments:
      source_path: '%RECIPE_CACHE_DIR%/downloads/%SOFTWARE_TITLE%-arm64.dmg/Brave Browser.app'
      destination_path: '%RECIPE_CACHE_DIR%/payload/Applications/Brave Browser-arm64.app'

  - Processor: Copier
    Arguments:
      source_path: '%RECIPE_CACHE_DIR%/downloads/%SOFTWARE_TITLE%-x86_64.dmg/Brave Browser.app'
      destination_path: '%RECIPE_CACHE_DIR%/payload/Applications/Brave Browser-x86_64.app'

  - Processor: FileCreator
    Arguments:
      file_path: '%RECIPE_CACHE_DIR%/payload/scripts/postinstall'
      file_mode: '0755'
      file_content: |
        #!/bin/bash
        set -euo pipefail
        if [[ $( /usr/bin/arch ) = arm64* ]]; then
          /bin/rm -rf "/Applications/Brave Browser-x86_64.app"
          /bin/mv "/Applications/Brave Browser-arm64.app" "/Applications/Brave Browser.app"
        else
          /bin/rm -rf "/Applications/Brave Browser-arm64.app"
          /bin/mv "/Applications/Brave Browser-x86_64.app" "/Applications/Brave Browser.app"
        fi
        exit 0

  - Processor: PkgCreator
    Arguments:
      pkg_request:
        id: com.brave.Browser
        options: purge_ds_store
        pkgdir: '%RECIPE_CACHE_DIR%'
        pkgname: '%SOFTWARE_TITLE%-%version%'
        pkgroot: '%RECIPE_CACHE_DIR%/payload'
        scripts: '%RECIPE_CACHE_DIR%/payload/scripts'
        version: '%version%'

  - Processor: PathDeleter
    Arguments:
      path_list:
        - '%RECIPE_CACHE_DIR%/payload'
