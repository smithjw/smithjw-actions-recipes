Description: |
  Downloads KeePassXC and produces a verified artefact for downstream packaging.

  Run as part of the full download → pkg → upload chain. The `URLDownloaderPython`
  processor caches by ETag/Last-Modified/Content-Length and the
  `StopProcessingIf download_changed == False` predicate short-circuits the chain
  on no-op re-runs. Pointing the upload recipe at a pre-built pkg would defeat
  this cache and re-upload on every CI run.

  KeePassXC publishes separate `arm64` and `x86_64` `.dmg` files; we pull both so the
  resulting pkg can install on either architecture (see KeePassXC.pkg.recipe.yaml).
Identifier: com.github.smithjw-actions.download.KeePassXC
MinimumVersion: '2.9'

Input:
  NAME: KeePassXC
  SOFTWARE_TITLE: KeePassXC
  INCLUDE_PRERELEASES: null
  DOWNLOAD_MISSING_FILE: 'True'
  BYPASS_STOP_PROCESSING_IF_DOWNLOAD_UNCHANGED: 'False'

Process:
  - Processor: GitHubReleasesInfoProvider
    Arguments:
      asset_regex: 'KeePassXC-[\d.]+-arm64\.dmg'
      github_repo: keepassxreboot/keepassxc
      include_prereleases: '%INCLUDE_PRERELEASES%'

  - Processor: com.github.smithjw-actions.processors/URLDownloaderPython
    Arguments:
      download_missing_file: '%DOWNLOAD_MISSING_FILE%'
      filename: '%SOFTWARE_TITLE%-arm64.dmg'

  - Processor: GitHubReleasesInfoProvider
    Arguments:
      asset_regex: 'KeePassXC-[\d.]+-x86_64\.dmg'
      github_repo: keepassxreboot/keepassxc
      include_prereleases: '%INCLUDE_PRERELEASES%'

  - Processor: com.github.smithjw-actions.processors/URLDownloaderPython
    Arguments:
      download_missing_file: '%DOWNLOAD_MISSING_FILE%'
      filename: '%SOFTWARE_TITLE%-x86_64.dmg'

  - Processor: EndOfCheckPhase

  - Processor: StopProcessingIf
    Arguments:
      predicate: 'download_changed == False AND %BYPASS_STOP_PROCESSING_IF_DOWNLOAD_UNCHANGED% == False'

  - Processor: CodeSignatureVerifier
    Arguments:
      deep_verification: true
      input_path: '%RECIPE_CACHE_DIR%/downloads/%SOFTWARE_TITLE%-arm64.dmg/KeePassXC.app'
      requirement: identifier "org.keepassxc.keepassxc" and anchor apple generic and certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and certificate leaf[subject.OU] = G2S7P7J672
      strict_verification: true

  - Processor: CodeSignatureVerifier
    Arguments:
      deep_verification: true
      input_path: '%RECIPE_CACHE_DIR%/downloads/%SOFTWARE_TITLE%-x86_64.dmg/KeePassXC.app'
      requirement: identifier "org.keepassxc.keepassxc" and anchor apple generic and certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and certificate leaf[subject.OU] = G2S7P7J672
      strict_verification: true
