Description: |
  Downloads GitHub Desktop and produces verified artefacts for downstream packaging.

  Run as part of the full download → pkg → upload chain. The `URLDownloaderPython`
  processor caches by ETag/Last-Modified/Content-Length and the
  `StopProcessingIf download_changed == False` predicate short-circuits the chain
  on no-op re-runs. Pointing the upload recipe at a pre-built pkg would defeat
  this cache and re-upload on every CI run.

  GitHub Desktop publishes separate `GitHub.Desktop-arm64.zip` and
  `GitHub.Desktop-x64.zip` assets on GitHub Releases. We pull both, unpack them,
  verify each bundle signature, and let the pkg recipe install only the matching
  architecture.
Identifier: com.github.smithjw-actions.download.GitHub_Desktop
MinimumVersion: '2.9'

Input:
  NAME: GitHub Desktop
  SOFTWARE_TITLE: GitHub_Desktop
  INCLUDE_PRERELEASES: null
  DOWNLOAD_MISSING_FILE: null
  BYPASS_STOP_PROCESSING_IF_DOWNLOAD_UNCHANGED: 'False'

Process:
  - Processor: GitHubReleasesInfoProvider
    Arguments:
      asset_regex: 'GitHub\.Desktop-arm64\.zip'
      github_repo: desktop/desktop
      include_prereleases: '%INCLUDE_PRERELEASES%'

  - Processor: URLDownloaderPython
    Arguments:
      download_missing_file: '%DOWNLOAD_MISSING_FILE%'
      filename: '%SOFTWARE_TITLE%-arm64.zip'

  - Processor: GitHubReleasesInfoProvider
    Arguments:
      asset_regex: 'GitHub\.Desktop-x64\.zip'
      github_repo: desktop/desktop
      include_prereleases: '%INCLUDE_PRERELEASES%'

  - Processor: URLDownloaderPython
    Arguments:
      download_missing_file: '%DOWNLOAD_MISSING_FILE%'
      filename: '%SOFTWARE_TITLE%-x86_64.zip'

  - Processor: EndOfCheckPhase

  - Processor: StopProcessingIf
    Arguments:
      predicate: 'download_changed == %BYPASS_STOP_PROCESSING_IF_DOWNLOAD_UNCHANGED%'

  - Processor: Unarchiver
    Arguments:
      archive_path: '%RECIPE_CACHE_DIR%/downloads/%SOFTWARE_TITLE%-arm64.zip'
      destination_path: '%RECIPE_CACHE_DIR%/unpack/arm64'
      purge_destination: true

  - Processor: Unarchiver
    Arguments:
      archive_path: '%RECIPE_CACHE_DIR%/downloads/%SOFTWARE_TITLE%-x86_64.zip'
      destination_path: '%RECIPE_CACHE_DIR%/unpack/x86_64'
      purge_destination: true

  - Processor: CodeSignatureVerifier
    Arguments:
      deep_verification: true
      input_path: '%RECIPE_CACHE_DIR%/unpack/arm64/GitHub Desktop.app'
      requirement: identifier "com.github.GitHubClient" and anchor apple generic and certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and certificate leaf[subject.OU] = "VEKTX9H2N7"
      strict_verification: true

  - Processor: CodeSignatureVerifier
    Arguments:
      deep_verification: true
      input_path: '%RECIPE_CACHE_DIR%/unpack/x86_64/GitHub Desktop.app'
      requirement: identifier "com.github.GitHubClient" and anchor apple generic and certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and certificate leaf[subject.OU] = "VEKTX9H2N7"
      strict_verification: true

  - Processor: Versioner
    Arguments:
      input_plist_path: '%RECIPE_CACHE_DIR%/unpack/arm64/GitHub Desktop.app/Contents/Info.plist'
      plist_version_key: CFBundleShortVersionString
