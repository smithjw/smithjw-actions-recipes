Description: |
  Packaging step for OBS Studio. Must run after the download recipe so
  `URLDownloaderPython` caching can short-circuit unchanged builds.

  Packages both architectures of OBS Studio into a single installer pkg. A postinstall
  script picks the correct .app for the device's architecture and removes the other.
Identifier: com.github.smithjw-actions.pkg.OBS_Studio
ParentRecipe: com.github.smithjw-actions.download.OBS_Studio
MinimumVersion: '2.9'

Input:
  NAME: OBS Studio
  SOFTWARE_TITLE: OBS_Studio

Process:
  - Processor: PkgRootCreator
    Arguments:
      pkgroot: '%RECIPE_CACHE_DIR%/payload'
      pkgdirs:
        Applications: '0755'
        scripts: '0755'

  - Processor: Copier
    Arguments:
      source_path: '%RECIPE_CACHE_DIR%/downloads/%SOFTWARE_TITLE%-arm64.dmg/OBS.app'
      destination_path: '%RECIPE_CACHE_DIR%/payload/Applications/OBS-arm64.app'

  - Processor: Copier
    Arguments:
      source_path: '%RECIPE_CACHE_DIR%/downloads/%SOFTWARE_TITLE%-x86_64.dmg/OBS.app'
      destination_path: '%RECIPE_CACHE_DIR%/payload/Applications/OBS-x86_64.app'

  - Processor: FileCreator
    Arguments:
      file_path: '%RECIPE_CACHE_DIR%/payload/scripts/postinstall'
      file_mode: '0755'
      file_content: |
        #!/bin/bash
        set -euo pipefail
        if [[ $( /usr/bin/arch ) = arm64* ]]; then
          /bin/rm -rf "/Applications/OBS-x86_64.app"
          /bin/mv "/Applications/OBS-arm64.app" "/Applications/OBS.app"
        else
          /bin/rm -rf "/Applications/OBS-arm64.app"
          /bin/mv "/Applications/OBS-x86_64.app" "/Applications/OBS.app"
        fi
        exit 0

  - Processor: PkgCreator
    Arguments:
      pkg_request:
        id: com.obsproject.obs-studio
        options: purge_ds_store
        pkgdir: '%RECIPE_CACHE_DIR%'
        pkgname: '%SOFTWARE_TITLE%-%version%'
        pkgroot: '%RECIPE_CACHE_DIR%/payload'
        scripts: '%RECIPE_CACHE_DIR%/payload/scripts'
        version: '%version%'

  - Processor: PathDeleter
    Arguments:
      path_list:
        - '%RECIPE_CACHE_DIR%/payload'
