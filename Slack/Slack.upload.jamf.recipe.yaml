Description: |
  Final step for Slack: uploads the pkg to Jamf Pro and rotates old packages
  (keeps the most recent 2). Downstream override repos can override this recipe
  to attach policies / scopes specific to their environment. Run as part of the
  full download → pkg → upload chain so `URLDownloaderPython` caching can
  short-circuit unchanged builds.

  Downloads the latest version of Slack, packages it, and uploads to Jamf Pro.
Identifier: com.github.smithjw-actions.jamf.upload.Slack
ParentRecipe: com.github.smithjw-actions.pkg.Slack
MinimumVersion: '2.9'

Input:
  NAME: Slack
  SOFTWARE_TITLE: Slack
  CATEGORY: Apps
  REMOVE_OLD_PACKAGES: 'true'
  PACKAGE_INFO: autopkg
  PKG_TO_KEEP: '2'
  PKG_NAME_MATCH: '%SOFTWARE_TITLE%-'

Process:
  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPackageUploader
    Arguments:
      pkg_category: '%CATEGORY%'
      pkg_info: '%PACKAGE_INFO%'

  - Processor: com.github.grahampugh.recipes.postprocessors/LastRecipeRunResult

  - Processor: StopProcessingIf
    Arguments:
      predicate: '%REMOVE_OLD_PACKAGES% == false'

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPackageCleaner
    Arguments:
      pkg_name_match: '%PKG_NAME_MATCH%'
      versions_to_keep: '%PKG_TO_KEEP%'
